<template>
    <lightning-card title="Nuevo Proyecto">
        <div slot="actions">
            <template lwc:if={recordId}>
                <lightning-button label="Nuevo" variant="brand" onclick={handleClick}></lightning-button>
            </template>
        </div>

        <div class="slds-p-around_medium">
            <template for:each={formInstances} for:item="form">
                <lightning-record-form
                    key={form.key}
                    object-api-name={objectApiName}
                    fields={fields}
                    onsuccess={successHandler}>
                </lightning-record-form>
            </template>
        </div>
    </lightning-card>
</template>
